<!DOCTYPE html>
<html lang="zh-CN" data-ha-style="architectural-spread">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TencentDB Agent Memory · 面试深度解析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-taupe: #6B655F;
      --c-taupe-dark: #4A453F;
      --c-cream: #EBE8E3;
      --c-cream-deep: #DDD8D2;
      --c-moss: #2A3826;
      --c-black: #111111;
      --c-white: #FFFFFF;
      --c-ink-muted: #444444;
      --c-rule: rgba(17, 17, 17, 0.22);
      --c-accent: #a03b00;
      --c-l3: #4a7c59;
      --c-l2: #7b6b8a;
      --c-l1: #5a6e8a;
      --c-l0: #8a6b5a;
      --c-highlight: #c94c00;

      --font-sans: 'Noto Sans SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-serif: 'Noto Serif SC', 'Times New Roman', Times, serif;

      --spacing-unit: 2rem;
      --page-padding: clamp(1.4rem, 4vw, 3rem);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--c-cream);
      height: 100vh;
      overflow: hidden;
    }

    .architectural-viewport {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }

    .col-visual {
      background: var(--c-taupe);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: var(--page-padding);
      overflow: hidden;
    }

    .col-content {
      background: var(--c-cream);
      display: flex;
      flex-direction: column;
      padding: var(--page-padding);
      overflow: hidden;
    }

    .visual-object {
      width: clamp(180px, 35vw, 320px);
      height: clamp(180px, 35vw, 320px);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .visual-object svg { width: 100%; height: 100%; }

    .visual-inset {
      position: absolute;
      bottom: var(--page-padding);
      left: var(--page-padding);
      width: clamp(80px, 15vw, 140px);
      height: clamp(60px, 12vw, 100px);
      background: var(--c-taupe-dark);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--c-cream);
      opacity: 0.7;
    }

    .header-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--c-ink-muted);
      margin-bottom: var(--space-lg);
    }

    .headline {
      font-family: var(--font-sans);
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--c-black);
      margin-bottom: var(--space-xl);
    }

    .headline-serif {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
    }

    .body-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--c-ink-muted);
      max-width: 340px;
    }

    .body-text p { margin-bottom: var(--space-lg); }

    .body-text code {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--c-cream-deep);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .nav-anchor {
      position: absolute;
      font-size: 11px;
      font-weight: 500;
      color: var(--c-ink-muted);
      cursor: pointer;
      user-select: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .nav-anchor:hover { opacity: 1; }
    .nav-close { top: var(--page-padding); right: var(--page-padding); }
    .nav-more { bottom: var(--page-padding); right: var(--page-padding); }
    .nav-prev { bottom: var(--page-padding); left: 50%; transform: translateX(-50%); }

    .pagination {
      position: absolute;
      bottom: var(--page-padding);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-rule);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active { background: var(--c-accent); transform: scale(1.3); }
    .dot:hover { background: var(--c-ink-muted); }

    .chapter-indicator {
      font-size: 11px;
      color: var(--c-ink-muted);
      opacity: 0.5;
      margin-top: auto;
      padding-top: var(--space-xl);
    }

    .question-tag {
      display: inline-block;
      background: var(--c-accent);
      color: var(--c-white);
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 3px;
      margin-bottom: var(--space-md);
    }

    .answer-block {
      background: var(--c-cream-deep);
      padding: var(--space-md);
      border-radius: 6px;
      margin-top: var(--space-md);
      border-left: 3px solid var(--c-accent);
    }

    .answer-block p {
      font-size: 12px;
      color: var(--c-ink-muted);
      margin-bottom: var(--space-sm);
    }

    .key-insight {
      background: linear-gradient(135deg, var(--c-accent) 0%, var(--c-highlight) 100%);
      color: var(--c-white);
      padding: var(--space-sm) var(--space-md);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      margin-top: var(--space-md);
      display: inline-block;
    }

    .stat-row {
      display: flex;
      gap: var(--space-lg);
      margin-top: var(--space-lg);
    }

    .stat-box {
      text-align: center;
      padding: var(--space-md);
      background: var(--c-cream-deep);
      border-radius: 6px;
      flex: 1;
    }

    .stat-box .value {
      font-size: 24px;
      font-weight: 600;
      color: var(--c-accent);
    }

    .stat-box .label {
      font-size: 10px;
      color: var(--c-ink-muted);
      margin-top: 4px;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--space-md);
      font-size: 11px;
    }

    .compare-table th {
      background: var(--c-cream-deep);
      padding: var(--space-sm);
      text-align: left;
      font-weight: 600;
      color: var(--c-black);
    }

    .compare-table td {
      padding: var(--space-sm);
      border-bottom: 1px solid var(--c-rule);
      color: var(--c-ink-muted);
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding-right: var(--space-md);
    }

    .scroll-content::-webkit-scrollbar { width: 4px; }
    .scroll-content::-webkit-scrollbar-track { background: transparent; }
    .scroll-content::-webkit-scrollbar-thumb { background: var(--c-rule); border-radius: 2px; }

    .flow-chain {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }

    .flow-step {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      font-size: 11px;
      color: var(--c-cream);
    }

    .flow-step .arrow {
      font-size: 14px;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .architectural-viewport {
        grid-template-columns: 1fr;
        grid-template-rows: 40vh 1fr;
        height: auto;
        overflow-y: auto;
      }

      body { height: auto; overflow: auto; }
      .col-visual { padding: var(--space-xl); }
      .col-content { padding: var(--space-xl) var(--page-padding); max-height: none; }
      .visual-inset, .nav-anchor { display: none; }
      .scroll-content { overflow: visible; }
    }
  </style>
</head>
<body>

<div class="architectural-viewport" id="viewport">
  <div class="col-visual">
    <div class="visual-object" id="visual-object"></div>

    <span class="nav-anchor nav-close" onclick="window.close()">Close ( × )</span>

  </div>

  <div class="col-content">
    <div class="scroll-content" id="scroll-content">

      <div class="body-text" id="body-text"></div>
      <div class="chapter-indicator" id="chapter-indicator">Chapter 1 of 6</div>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

let currentChapter = 0;

function renderChapter(index) {
  const chapter = chapters[index];
  document.getElementById('header-label').textContent = chapter.label;
  document.getElementById('headline').innerHTML = chapter.headline;
  document.getElementById('body-text').innerHTML = chapter.body;
  document.getElementById('visual-object').innerHTML = chapter.visual;
  document.getElementById('visual-inset').textContent = chapter.inset;
  document.getElementById('chapter-indicator').textContent = `Chapter ${index + 1} of ${chapters.length}`;

  const pagination = document.getElementById('pagination');
  pagination.innerHTML = chapters.map((_, i) =>
    `<span class="dot ${i === index ? 'active' : ''}" onclick="goToChapter(${i})"></span>`
  ).join('');

  const prevBtn = document.getElementById('nav-prev');
  prevBtn.textContent = index > 0 ? '← Prev' : '';
  prevBtn.style.visibility = index > 0 ? 'visible' : 'hidden';

  document.getElementById('scroll-content').scrollTop = 0;
}

function goToChapter(index) {
  currentChapter = index;
  renderChapter(currentChapter);
}

function nextChapter() {
  if (currentChapter < chapters.length - 1) {
    currentChapter++;
    renderChapter(currentChapter);
  }
}

function prevChapter() {
  if (currentChapter > 0) {
    currentChapter--;
    renderChapter(currentChapter);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextChapter(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevChapter(); }
});

let touchStartX = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', (e) => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) { if (diff > 0) nextChapter(); else prevChapter(); }
});

renderChapter(0);
</script>
