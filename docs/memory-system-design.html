<!DOCTYPE html>
<html lang="zh-CN" data-ha-style="architectural-spread">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TencentDB Agent Memory · 四层记忆系统设计</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-taupe: #6B655F;
      --c-taupe-dark: #4A453F;
      --c-cream: #EBE8E3;
      --c-cream-deep: #DDD8D2;
      --c-moss: #2A3826;
      --c-black: #111111;
      --c-white: #FFFFFF;
      --c-ink-muted: #444444;
      --c-rule: rgba(17, 17, 17, 0.22);
      --c-accent: #a03b00;
      --c-l3: #4a7c59;
      --c-l2: #7b6b8a;
      --c-l1: #5a6e8a;
      --c-l0: #8a6b5a;

      --font-sans: 'Noto Sans SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-serif: 'Noto Serif SC', 'Times New Roman', Times, serif;

      --spacing-unit: 2rem;
      --page-padding: clamp(1.4rem, 4vw, 3rem);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--c-cream);
      height: 100vh;
      overflow: hidden;
    }

    .architectural-viewport {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }

    .col-visual {
      background: var(--c-taupe);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: var(--page-padding);
      overflow: hidden;
    }

    .col-content {
      background: var(--c-cream);
      display: flex;
      flex-direction: column;
      padding: var(--page-padding);
      overflow: hidden;
    }

    .visual-object {
      width: clamp(180px, 35vw, 320px);
      height: clamp(180px, 35vw, 320px);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .visual-object svg {
      width: 100%;
      height: 100%;
    }

    .visual-inset {
      position: absolute;
      bottom: var(--page-padding);
      left: var(--page-padding);
      width: clamp(80px, 15vw, 140px);
      height: clamp(60px, 12vw, 100px);
      background: var(--c-taupe-dark);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--c-cream);
      opacity: 0.7;
    }

    .header-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--c-ink-muted);
      margin-bottom: var(--space-lg);
    }

    .headline {
      font-family: var(--font-sans);
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--c-black);
      margin-bottom: var(--space-xl);
    }

    .headline-serif {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
    }

    .body-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--c-ink-muted);
      max-width: 340px;
    }

    .body-text p {
      margin-bottom: var(--space-lg);
    }

    .body-text code {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--c-cream-deep);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .nav-anchor {
      position: absolute;
      font-size: 11px;
      font-weight: 500;
      color: var(--c-ink-muted);
      cursor: pointer;
      user-select: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .nav-anchor:hover {
      opacity: 1;
    }

    .nav-close {
      top: var(--page-padding);
      right: var(--page-padding);
    }

    .nav-more {
      bottom: var(--page-padding);
      right: var(--page-padding);
    }

    .nav-prev {
      bottom: var(--page-padding);
      left: 50%;
      transform: translateX(-50%);
    }

    .pagination {
      position: absolute;
      bottom: var(--page-padding);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-rule);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: var(--c-accent);
      transform: scale(1.3);
    }

    .dot:hover {
      background: var(--c-ink-muted);
    }

    .chapter-indicator {
      font-size: 11px;
      color: var(--c-ink-muted);
      opacity: 0.5;
      margin-top: auto;
      padding-top: var(--space-xl);
    }

    .layer-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: var(--space-md);
    }

    .layer-badge.l0 { background: var(--c-l0); color: var(--c-white); }
    .layer-badge.l1 { background: var(--c-l1); color: var(--c-white); }
    .layer-badge.l2 { background: var(--c-l2); color: var(--c-white); }
    .layer-badge.l3 { background: var(--c-l3); color: var(--c-white); }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      margin-top: var(--space-xl);
    }

    .stat-item {
      text-align: center;
      padding: var(--space-lg);
      background: var(--c-cream-deep);
      border-radius: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--c-accent);
    }

    .stat-label {
      font-size: 10px;
      color: var(--c-ink-muted);
      margin-top: 4px;
    }

    .flow-diagram {
      width: 100%;
      max-width: 280px;
      margin-top: var(--space-xl);
    }

    .flow-diagram svg {
      width: 100%;
      height: auto;
    }

    .memory-chain {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      margin-top: var(--space-xl);
    }

    .memory-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      font-size: 12px;
      color: var(--c-cream);
    }

    .memory-item .num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 11px;
    }

    .memory-item.l0 .num { background: var(--c-l0); }
    .memory-item.l1 .num { background: var(--c-l1); }
    .memory-item.l2 .num { background: var(--c-l2); }
    .memory-item.l3 .num { background: var(--c-l3); }

    .mermaid-preview {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-cream);
      background: var(--c-taupe-dark);
      padding: var(--space-md);
      border-radius: 4px;
      white-space: pre;
      line-height: 1.4;
      opacity: 0.8;
    }

    .concept-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      margin-top: var(--space-lg);
    }

    .concept-item {
      padding: var(--space-md);
      background: var(--c-cream-deep);
      border-radius: 6px;
    }

    .concept-item h4 {
      font-size: 12px;
      font-weight: 600;
      color: var(--c-black);
      margin-bottom: 4px;
    }

    .concept-item p {
      font-size: 11px;
      color: var(--c-ink-muted);
      line-height: 1.5;
    }

    .highlight-box {
      background: var(--c-cream-deep);
      border-left: 3px solid var(--c-accent);
      padding: var(--space-md) var(--space-lg);
      margin-top: var(--space-lg);
      font-size: 12px;
      color: var(--c-ink-muted);
    }

    .layer-tree {
      margin-top: var(--space-lg);
    }

    .layer-node {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .layer-tag {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      color: var(--c-white);
      min-width: 32px;
      text-align: center;
    }

    .layer-tag.l0 { background: var(--c-l0); }
    .layer-tag.l1 { background: var(--c-l1); }
    .layer-tag.l2 { background: var(--c-l2); }
    .layer-tag.l3 { background: var(--c-l3); }

    .layer-content {
      font-size: 12px;
      color: var(--c-ink-muted);
      line-height: 1.5;
    }

    .layer-content strong {
      color: var(--c-black);
      font-weight: 500;
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding-right: var(--space-md);
    }

    .scroll-content::-webkit-scrollbar {
      width: 4px;
    }

    .scroll-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .scroll-content::-webkit-scrollbar-thumb {
      background: var(--c-rule);
      border-radius: 2px;
    }

    .storage-diagram {
      width: 100%;
      max-width: 260px;
      margin-top: var(--space-lg);
    }

    @media (max-width: 768px) {
      .architectural-viewport {
        grid-template-columns: 1fr;
        grid-template-rows: 40vh 1fr;
        height: auto;
        overflow-y: auto;
      }

      body {
        height: auto;
        overflow: auto;
      }

      .col-visual {
        padding: var(--space-xl);
      }

      .col-content {
        padding: var(--space-xl) var(--page-padding);
        max-height: none;
      }

      .visual-inset {
        display: none;
      }

      .nav-anchor {
        display: none;
      }

      .scroll-content {
        overflow: visible;
      }
    }
  </style>
</head>
<body>

<div class="architectural-viewport" id="viewport">

  <!-- Left Visual Bay -->
  <div class="col-visual">
    <div class="visual-object" id="visual-object">
      <!-- Dynamic SVG based on chapter -->
    </div>
    <div class="visual-inset" id="visual-inset">
      Memory Layers
    </div>
    <span class="nav-anchor nav-close" onclick="window.close()">Close ( × )</span>
    <span class="nav-anchor nav-prev" id="nav-prev" onclick="prevChapter()">← Prev</span>
  </div>

  <!-- Right Editorial Panel -->
  <div class="col-content">
    <div class="scroll-content" id="scroll-content">
      <div class="header-label" id="header-label">Overview</div>

      </h1>
      <div class="body-text" id="body-text">
        <!-- Dynamic content -->
      </div>
      <div class="chapter-indicator" id="chapter-indicator">
        Chapter 1 of 5
      </div>
    </div>
    <div class="pagination" id="pagination">
      <!-- Dynamic dots -->
    </div>
  </div>

</div>

<script>

      <p>核心设计不是把历史对话切片后丢进扁平向量库，而是把记忆拆成两条互补链路：</p>

let currentChapter = 0;

function renderChapter(index) {
  const chapter = chapters[index];

  document.getElementById('header-label').textContent = chapter.label;
  document.getElementById('headline').innerHTML = chapter.headline;
  document.getElementById('body-text').innerHTML = chapter.body;
  document.getElementById('visual-object').innerHTML = chapter.visual;
  document.getElementById('visual-inset').textContent = chapter.inset;
  document.getElementById('chapter-indicator').textContent = `Chapter ${index + 1} of ${chapters.length}`;

  // Update pagination dots
  const pagination = document.getElementById('pagination');
  pagination.innerHTML = chapters.map((_, i) =>
    `<span class="dot ${i === index ? 'active' : ''}" onclick="goToChapter(${i})"></span>`
  ).join('');

  // Update prev button
  const prevBtn = document.getElementById('nav-prev');
  prevBtn.textContent = index > 0 ? '← Prev' : '';
  prevBtn.style.visibility = index > 0 ? 'visible' : 'hidden';

  // Reset scroll
  document.getElementById('scroll-content').scrollTop = 0;
}

function goToChapter(index) {
  currentChapter = index;
  renderChapter(currentChapter);
}

function nextChapter() {
  if (currentChapter < chapters.length - 1) {
    currentChapter++;
    renderChapter(currentChapter);
  }
}

function prevChapter() {
  if (currentChapter > 0) {
    currentChapter--;
    renderChapter(currentChapter);
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    nextChapter();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    prevChapter();
  }
});

// Touch swipe support
let touchStartX = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
});

document.addEventListener('touchend', (e) => {
  const touchEndX = e.changedTouches[0].clientX;
  const diff = touchStartX - touchEndX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) nextChapter();
    else prevChapter();
  }
});

// Initial render
renderChapter(0);
</script>
